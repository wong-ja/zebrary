<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zebrary — Login</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/output.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="bg-zeb-soft dark:bg-gray-900 min-h-screen flex items-center justify-center" style="color: var(--color-text);">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 w-full max-w-sm mx-4">
    <div class="flex flex-col items-center mb-6">
      <img src="/logo-icon.png" class="w-10 h-10 mb-2" alt="Zebrary">
      <h1 class="text-2xl font-bold" style="color: var(--color-text);">Zebrary</h1>
    </div>

    <form id="login-form">
      <div class="mb-4">
        <label for="login-username" class="block text-sm font-medium mb-1" style="color: var(--color-text-secondary);">Username or Email</label>
        <input type="text" id="login-username" class="w-full border rounded-lg px-3 py-2 outline-none transition-colors focus:ring-2 focus:ring-zeb-blue focus:border-zeb-blue" style="background-color: var(--color-bg); border-color: var(--color-border); color: var(--color-text);" required>
      </div>
      <div class="mb-4">
        <label for="login-password" class="block text-sm font-medium mb-1" style="color: var(--color-text-secondary);">Password</label>
        <input type="password" id="login-password" class="w-full border rounded-lg px-3 py-2 outline-none transition-colors focus:ring-2 focus:ring-zeb-blue focus:border-zeb-blue" style="background-color: var(--color-bg); border-color: var(--color-border); color: var(--color-text);" required>
      </div>
      <button type="submit" class="w-full bg-zeb-navy dark:bg-zeb-blue hover:opacity-90 text-white py-2 rounded-lg font-medium transition-colors">Login</button>
      <p class="text-center mt-4 text-sm" style="color: var(--color-text-secondary);">
        Don't have an account?
        <a href="#" id="show-register" class="text-zeb-blue hover:text-zeb-navy dark:hover:text-white underline">Register</a>
      </p>
      <div id="login-error" class="mt-3 text-red-600 dark:text-red-400 text-sm text-center hidden" role="alert"></div>
    </form>

    <form id="register-form" class="hidden">
      <div class="mb-4">
        <label for="register-username" class="block text-sm font-medium mb-1" style="color: var(--color-text-secondary);">Username</label>
        <input type="text" id="register-username" class="w-full border rounded-lg px-3 py-2 outline-none transition-colors focus:ring-2 focus:ring-zeb-blue focus:border-zeb-blue" style="background-color: var(--color-bg); border-color: var(--color-border); color: var(--color-text);" required>
      </div>
      <div class="mb-4">
        <label for="register-email" class="block text-sm font-medium mb-1" style="color: var(--color-text-secondary);">Email</label>
        <input type="email" id="register-email" class="w-full border rounded-lg px-3 py-2 outline-none transition-colors focus:ring-2 focus:ring-zeb-blue focus:border-zeb-blue" style="background-color: var(--color-bg); border-color: var(--color-border); color: var(--color-text);" required>
      </div>
      <div class="mb-4">
        <label for="register-password" class="block text-sm font-medium mb-1" style="color: var(--color-text-secondary);">Password</label>
        <input type="password" id="register-password" class="w-full border rounded-lg px-3 py-2 outline-none transition-colors focus:ring-2 focus:ring-zeb-blue focus:border-zeb-blue" style="background-color: var(--color-bg); border-color: var(--color-border); color: var(--color-text);" required>
      </div>
      <button type="submit" class="w-full bg-zeb-gold text-zeb-dark hover:brightness-110 py-2 rounded-lg font-medium transition-colors">Register</button>
      <p class="text-center mt-4 text-sm" style="color: var(--color-text-secondary);">
        Already have an account?
        <a href="#" id="show-login" class="text-zeb-blue hover:text-zeb-navy dark:hover:text-white underline">Login</a>
      </p>
      <div id="register-error" class="mt-3 text-red-600 dark:text-red-400 text-sm text-center hidden" role="alert"></div>
    </form>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
